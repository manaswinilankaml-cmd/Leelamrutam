{% extends "base.html" %}

{% block content %}
<div class="auth-container">
    <div class="auth-box window-glass">
        <h2>Write a Story ✍️</h2>
        
        <form method="POST">
            <div class="form-group">
                <label>Story Title</label>
                <input type="text" name="title" placeholder="Enter title..." required>
            </div>
            
            <div class="form-group">
                <label>Section</label>
                <select name="section" required>
                    <option value="shiva">🔱 Shiva</option>
                    <option value="shakti">🌺 Shakti</option>
                    <option value="krishna">🦚 Krishna</option>
                    <option value="our_space">✨ Our Space</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>Story Content</label>
                <textarea name="content" rows="10" placeholder="Once upon a time..." required></textarea>
            </div>
            
            <button type="submit" class="btn btn-primary btn-block">Publish Story 🌸</button>
        </form>
    </div>
</div>
{% endblock %}
